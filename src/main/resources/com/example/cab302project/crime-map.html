<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Crime Map</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@latest/ol.css">
    <script src="https://cdn.jsdelivr.net/npm/ol@latest/dist/ol.js"></script>

    <style>
        html, body, #map {
          width: 100%;
          height: 100%;
          margin: 0;
        }
    </style>
</head>
<body>

<div id="map"></div>

<script>
    const vectorSource = new ol.source.Vector();

    const vectorLayer = new ol.layer.Vector({
      source: vectorSource
    });

    const map = new ol.Map({
      target: 'map',
      layers: [
        new ol.layer.Tile({
          source: new ol.source.OSM()
        }),
        vectorLayer
      ],
      view: new ol.View({
        center: ol.proj.fromLonLat([153.0235, -27.4709]),
        zoom: 13
      })
    });

    function getColor(severity) {
      severity = String(severity).trim().toUpperCase();

      if (severity === "LOW") return "#FFD700";
      if (severity === "MEDIUM") return "#FF8C00";
      if (severity === "CRITICAL") return "#DC143C";

      return "gray";
    }

    function loadCrimeMarkers(data) {
      const crimes = JSON.parse(data);

      vectorSource.clear();

      crimes.forEach(c => {
        const feature = new ol.Feature({
          geometry: new ol.geom.Point(
            ol.proj.fromLonLat([c.lon, c.lat])
          )
        });

        feature.setStyle(new ol.style.Style({
          image: new ol.style.Circle({
            radius: 8,
            fill: new ol.style.Fill({
              color: getColor(c.severity)
            }),
            stroke: new ol.style.Stroke({
              color: "#000",
              width: 1
            })
          })
        }));

        vectorSource.addFeature(feature);
      });

      if (vectorSource.getFeatures().length > 0) {
        map.getView().fit(vectorSource.getExtent(), {
          padding: [40, 40, 40, 40],
          maxZoom: 16,
          duration: 300
        });
      }
    }
</script>

</body>
</html>

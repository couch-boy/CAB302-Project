<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Crime Hotspots</title>
    <style>
        /* html, body and #map all use 100% sizing with no absolute positioning.
           Absolute positioning on the map div causes WebKit inside JavaFX WebView
           to return zero-sized bounding rects for Leaflet's internal panes, which
           leaves grey patches in the rendered map. Normal flow with 100% works. */
        html, body {
            margin: 0;
            padding: 0;
            border: 0;
            width: 100%;
            height: 100%;
            background: #f0eeeb;
        }
        #map {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            border: 0;
        }
        .hotspot-label {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            font-weight: bold;
            font-size: 11px;
            color: #000 !important;
        }
        .hotspot-label::before { display: none !important; }
        .leaflet-tooltip.hotspot-label { padding: 0; margin: 0; }
    </style>
</head>
<body>
<div id="map"></div>

<script>
    // State
    var TILE_PROXY_PORT = -1;
    var map = null;
    var hotspotLayer = null;
    var boundaryLayer = null;
    var hasFitted = false;
    var pendingHotspotData = null;

    // Called from Java whenever the WebView is resized. Tells Leaflet to recompute
    // tile positions for the new viewport size.
    function resizeMap(width, height) {
        if (map) {
            map.invalidateSize(true);
        }
    }

    // Called by LeafletLoader after injecting Leaflet JS and before pushing hotspot data.
    // Java provides the tile proxy port and the WebView's current dimensions.
    function initMap(tilePort, width, height) {
        if (map) return;
        TILE_PROXY_PORT = tilePort;

        // Force Leaflet to use 2D translate() instead of translate3d().
        // JavaFX WebView's WebKit has a GPU compositing bug where some translate3d
        // layers are silently not painted, leaving grey patches in the map tiles.
        L.Browser.any3d = false;

        map = L.map('map', {
            center: [-27.4709, 153.0235],
            zoom: 11,
            zoomControl: true,
            fadeAnimation: false,
            zoomAnimation: false,
            markerZoomAnimation: false
        });

        // Use CartoDB Positron - a clean light grey minimal style
        // Routed through the local Java proxy so tiles load on macOS and Windows alike.
        var tileUrl = TILE_PROXY_PORT > 0
            ? 'http://127.0.0.1:' + TILE_PROXY_PORT + '/cartodblight/{z}/{x}/{y}.png'
            : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png';

        L.tileLayer(tileUrl, {
            maxZoom: 19,
            subdomains: 'abcd',
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>'
        }).addTo(map);

        hotspotLayer = L.layerGroup().addTo(map);
        boundaryLayer = L.layerGroup().addTo(map);

        // If Java called loadHotspots before initMap finished, apply the buffered data now
        if (pendingHotspotData !== null) {
            loadHotspots(pendingHotspotData);
            pendingHotspotData = null;
        }
    }

    // Draws the suburb boundary polygon on the map and flies to it.
    // Called by Java after a successful suburb search with the GeoJSON polygon string,
    // suburb display name, and centre coordinates from Nominatim.
    function showSuburbBoundary(geoJsonStr, name, lat, lon) {
        if (!map) return;

        // Remove any existing boundary
        boundaryLayer.clearLayers();

        try {
            var geoJson = JSON.parse(geoJsonStr);

            // Draw the suburb outline as a dashed blue polygon
            var poly = L.geoJSON(geoJson, {
                style: {
                    color: '#2A364E',
                    weight: 2.5,
                    opacity: 0.9,
                    fillColor: '#4A90D9',
                    fillOpacity: 0.2,
                    dashArray: '6, 4'
                }
            });

            boundaryLayer.addLayer(poly);

            // Fit map to the suburb boundary
            var bounds = poly.getBounds();
            if (bounds.isValid()) {
                map.fitBounds(bounds, { padding: [20, 20], animate: false });
            } else {
                map.setView([lat, lon], 14);
            }

        } catch (e) {
            // GeoJSON parse failed — fall back to just flying to the centre point
            flyToSuburb(lat, lon, 14);
        }
    }

    // Flies the map to the given coordinates at the specified zoom level.
    // Used as a fallback when no GeoJSON polygon is available from Nominatim.
    function flyToSuburb(lat, lon, zoom) {
        if (!map) return;
        map.setView([lat, lon], zoom || 13);
    }

    // Removes the suburb boundary polygon from the map and resets the view to all of Brisbane.
    // Called by Java when the user clears the search.
    function clearSuburbBoundary() {
        if (!map) return;
        boundaryLayer.clearLayers();
        map.setView([-27.4709, 153.0235], 11);
        hasFitted = false;
    }

    // Extracts all coordinate rings from a GeoJSON geometry into a flat list of rings.
    // Handles both Polygon and MultiPolygon geometry types returned by Nominatim.
    function extractRings(geometry) {
        var rings = [];
        if (geometry.type === 'Polygon') {
            geometry.coordinates.forEach(function(ring) { rings.push(ring); });
        } else if (geometry.type === 'MultiPolygon') {
            geometry.coordinates.forEach(function(poly) {
                poly.forEach(function(ring) { rings.push(ring); });
            });
        }
        return rings;
    }

    // Ray-casting point-in-polygon test. Returns true if [lon, lat] is inside any
    // ring of the given GeoJSON geometry. Used to filter hotspots to only those
    // whose coordinates fall within the exact suburb boundary polygon.
    function pointInGeoJson(lat, lon, geometry) {
        var rings = extractRings(geometry);
        for (var r = 0; r < rings.length; r++) {
            var ring = rings[r];
            var inside = false;
            for (var i = 0, j = ring.length - 1; i < ring.length; j = i++) {
                var xi = ring[i][0], yi = ring[i][1];
                var xj = ring[j][0], yj = ring[j][1];
                if (((yi > lat) !== (yj > lat)) &&
                    (lon < (xj - xi) * (lat - yi) / (yj - yi) + xi)) {
                    inside = !inside;
                }
            }
            if (inside) return true;
        }
        return false;
    }

    // Returns the circle radius scaled to the number of crimes in the hotspot.
    // Single crimes show as a small dot. Clusters grow proportionally
    // so the size visually communicates crime density, matching the QPS map.
    function getRadius(count) {
        if (count === 1) return 10;
        return Math.min(10 + (count - 1) * 4, 48);
    }

    // Returns the fill colour for a hotspot circle based on crime count.
    // 1 crime = yellow (low), 2-4 = orange (moderate), 5+ = red (high).
    // Matches the QPS crime map colour convention where single incidents
    // are visually distinct from true hotspot clusters.
    function getColor(count) {
        if (count >= 5) return "rgba(220, 20, 60, 0.88)";
        if (count >= 2) return "rgba(255, 140, 0, 0.88)";
        return "rgba(255, 215, 0, 0.92)";
    }

    // Called by Java with a JSON array of hotspot objects containing lat, lon and count,
    // and an optional GeoJSON polygon string for precise point-in-polygon filtering.
    // When a polygon is provided, only hotspots whose coordinates fall inside it are shown,
    // giving accurate suburb-boundary filtering rather than just a bounding box.
    function loadHotspots(data, geoJsonStr) {
        if (!map) {
            pendingHotspotData = data;
            return;
        }

        // Parse the polygon filter if one was provided
        var filterGeometry = null;
        if (geoJsonStr && geoJsonStr.length > 0) {
            try { filterGeometry = JSON.parse(geoJsonStr); } catch(e) { filterGeometry = null; }
        }

        var allHotspots = JSON.parse(data);

        // Apply precise point-in-polygon filter — remove any hotspot outside the suburb polygon
        var hotspots = filterGeometry
            ? allHotspots.filter(function(h) { return pointInGeoJson(h.lat, h.lon, filterGeometry); })
            : allHotspots;

        hotspotLayer.clearLayers();

        var bounds = [];
        hotspots.forEach(function(h) {
            var latlng = [h.lat, h.lon];
            bounds.push(latlng);

            var circle = L.circleMarker(latlng, {
                radius: getRadius(h.count),
                fillColor: getColor(h.count),
                color: "#000",
                weight: 1,
                opacity: 1,
                fillOpacity: 0.85
            });

            circle.bindTooltip(String(h.count), {
                permanent: true,
                direction: 'center',
                className: 'hotspot-label'
            });

            hotspotLayer.addLayer(circle);
        });

        if (!hasFitted && bounds.length > 0 && boundaryLayer.getLayers().length === 0) {
            map.fitBounds(bounds, { padding: [40, 40], maxZoom: 14, animate: false });
            hasFitted = true;
        }
    }
</script>
</body>
</html>
